function formatYuan(val) {
    if (val === null || val === undefined || isNaN(val)) return "—";
    const abs = Math.abs(val);
    const sign = val < 0 ? "-" : "";
    if (abs >= 1e8) return sign + (abs / 1e8).toFixed(2) + "亿";
    if (abs >= 1e4) return sign + (abs / 1e4).toFixed(2) + "万";
    return sign + val.toFixed(2) + "元";
}

function formatGrowth(val) {
    if (val === null || val === undefined) return '<span class="growth-na">—</span>';
    const cls = val > 0 ? "growth-positive" : val < 0 ? "growth-negative" : "growth-na";
    const sign = val > 0 ? "+" : "";
    return '<span class="' + cls + '">' + sign + val.toFixed(1) + '%</span>';
}

// ─── 迷你柱状图 SVG ─────────────────
function renderSparkline(values, metricName, minZero) {
    const W = 180, H = 50, BAR_W = 15, GAP = 5;
    const PADDING_LEFT = 2;

    const validVals = values.filter(v => v !== null && !isNaN(v));
    if (validVals.length === 0) {
        return '<svg width="' + W + '" height="' + H + '"><text x="' + (W/2) + '" y="' + (H/2) +
               '" text-anchor="middle" fill="#cbd5e1" font-size="12">N/A</text></svg>';
    }

    // minZero=true 时，将负值视为 0 进行绘制（垂直轴最小值=0）
    const displayVals = minZero ? validVals.map(v => Math.max(v, 0)) : validVals;
    const maxAbs = minZero
        ? Math.max(...displayVals)
        : Math.max(...validVals.map(Math.abs));
    if (maxAbs === 0) {
        return '<svg width="' + W + '" height="' + H + '"><line x1="0" y1="' + (H-2) +
               '" x2="' + W + '" y2="' + (H-2) + '" stroke="#e5e7eb" stroke-width="0.5"/></svg>';
    }

    const hasNeg = minZero ? false : validVals.some(v => v < 0);
    const baseline = hasNeg ? H / 2 : H - 2;
    const maxBarH = hasNeg ? (H / 2 - 3) : (H - 6);

    let bars = '';
    // baseline
    if (hasNeg) {
        bars += '<line x1="0" y1="' + baseline + '" x2="' + W + '" y2="' + baseline + '" stroke="#e5e7eb" stroke-width="0.5"/>';
    }

    for (let i = 0; i < 9; i++) {
        const x = PADDING_LEFT + i * (BAR_W + GAP);
        const v = values[i];
        if (v === null || isNaN(v)) {
            // 灰色占位
            bars += '<line x1="' + x + '" y1="' + baseline + '" x2="' + (x + BAR_W) + '" y2="' + baseline + '" stroke="#ddd" stroke-width="2" stroke-dasharray="3,2"/>';
            continue;
        }
        const drawV = minZero ? Math.max(v, 0) : v;
        const barH = Math.max((Math.abs(drawV) / maxAbs) * maxBarH, minZero && v < 0 ? 2 : 2);
        const isForecast = (i === 8);
        let fill;
        if (isForecast) {
            fill = v >= 0 ? "#3b82f6" : "#f97316";
        } else {
            fill = v >= 0 ? "#dc2626" : "#16a34a";
        }
        const opacity = isForecast ? "0.9" : "0.7";
        let y;
        if (hasNeg) {
            y = drawV >= 0 ? baseline - barH : baseline;
        } else {
            y = baseline - barH;
        }
        // 负值在 minZero 模式下显示为底部极小条 + 特殊颜色提示
        if (minZero && v < 0) {
            const negH = 3;
            bars += '<rect x="' + x + '" y="' + (baseline - negH) + '" width="' + BAR_W + '" height="' + negH + '" fill="' + fill + '" rx="1.5" opacity="0.5"/>';
        } else {
            bars += '<rect x="' + x + '" y="' + y + '" width="' + BAR_W + '" height="' + barH + '" fill="' + fill + '" rx="1.5" opacity="' + opacity + '"/>';
        }
        if (isForecast) {
            const fY = (minZero && v < 0) ? (baseline - 3) : y;
            const fH = (minZero && v < 0) ? 3 : barH;
            bars += '<rect x="' + x + '" y="' + fY + '" width="' + BAR_W + '" height="' + fH + '" fill="none" stroke="' + fill + '" stroke-width="1.5" stroke-dasharray="3,2" rx="1.5"/>';
        }
    }

    return '<svg width="' + W + '" height="' + H + '" xmlns="http://www.w3.org/2000/svg">' + bars + '</svg>';
}

        html += '<td><span class="industry-tag">' + s.industry + '</span></td>';
        // 预告日期
        html += '<td>' + s.forecast_date + '</td>';
        // 类型
        html += '<td><span class="forecast-type ft-' + s.forecast_type + '">' + s.forecast_type + '</span></td>';

        // 营收走势
        html += '<td class="sparkline-cell"><div class="sparkline-wrapper">' +
                renderSparkline(s.revenue, "营收", false) +
                '<div class="sparkline-tooltip">' + tooltipContent(s.revenue, "营收") + '</div></div></td>';
        // 营收同比/环比
        html += '<td class="growth-cell">' + formatGrowth(s.revenue_yoy) + '</td>';
        html += '<td class="growth-cell">' + formatGrowth(s.revenue_qoq) + '</td>';

        // 扣非走势
        html += '<td class="sparkline-cell"><div class="sparkline-wrapper">' +
                renderSparkline(s.deducted_profit, "扣非净利润", true) +
                '<div class="sparkline-tooltip">' + tooltipContent(s.deducted_profit, "扣非净利润") + '</div></div></td>';
        // 扣非同比/环比
        html += '<td class="growth-cell">' + formatGrowth(s.deducted_profit_yoy) + '</td>';
        html += '<td class="growth-cell">' + formatGrowth(s.deducted_profit_qoq) + '</td>';

        // 归母走势
        html += '<td class="sparkline-cell"><div class="sparkline-wrapper">' +
                renderSparkline(s.net_profit, "归母净利润", true) +
                '<div class="sparkline-tooltip">' + tooltipContent(s.net_profit, "归母净利润") + '</div></div></td>';
        // 归母同比/环比
        html += '<td class="growth-cell">' + formatGrowth(s.net_profit_yoy) + '</td>';
        html += '<td class="growth-cell">' + formatGrowth(s.net_profit_qoq) + '</td>';

        html += "</tr>";
    });
    tbody.innerHTML = html;
}

// ─── 初始化 ──────────────────────────
renderSummary();
renderFilters();
renderHeader();
renderTable();
</script>
</body>
</html>
